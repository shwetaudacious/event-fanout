# Production values for DigitalOcean Kubernetes (DOKS)
# Usage:
#   helm upgrade --install event-fanout ./helm/eventfanout \
#     -f ./helm/eventfanout/values.yaml \
#     -f ./helm/eventfanout/values-doks.yaml \
#     --set secrets.databaseURL="$DATABASE_URL" \
#     --set secrets.redisURL="$REDIS_URL"

replicaCount: 2

image:
  repository: ghcr.io/shwetaudacious/event-fanout
  tag: latest

service:
  type: LoadBalancer

config:
  environment: production
  logLevel: info
  workerReplicas: 2
  fanoutWorkerPoolSize: 10
  redisStreamKey: events:stream
  redisConsumerGroup: fanout-workers

# Disable in-cluster Postgres/Redis — use DO Managed Databases
postgresql:
  enabled: false

redis:
  enabled: false

secrets:
  create: true
  # Override at deploy time:
  # databaseURL: postgres://user:pass@private-host:25060/eventfanout?sslmode=require
  # redisURL: rediss://default:pass@private-redis-host:25061

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
