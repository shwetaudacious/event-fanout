# Production values for DigitalOcean Kubernetes (DOKS)
# Usage:
#   helm upgrade --install event-fanout ./helm/eventfanout \
#     -f ./helm/eventfanout/values.yaml \
#     -f ./helm/eventfanout/values-doks.yaml \
#     --set secrets.databaseURL="$DATABASE_URL" \
#     --set secrets.redisURL="$REDIS_URL"

replicaCount: 1

image:
  repository: ghcr.io/shwetaudacious/event-fanout
  tag: latest

service:
  type: LoadBalancer

config:
  environment: production
  logLevel: info
  workerReplicas: 1
  fanoutWorkerPoolSize: 10
  redisStreamKey: events:stream
  redisConsumerGroup: fanout-workers

# Disable in-cluster Postgres — use DO Managed PostgreSQL
postgresql:
  enabled: false

# In-cluster Redis 7 (Streams). DO Managed Redis is unavailable on some accounts;
# this still satisfies the Redis Streams fanout backbone requirement.
redis:
  enabled: true

secrets:
  create: true
  # databaseURL set at deploy time from managed Postgres
  redisURL: "redis://event-fanout-queue:6379"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3

migrations:
  enabled: true
