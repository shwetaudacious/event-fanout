apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "event-fanout.fullname" . }}-server
  labels:
    {{- include "event-fanout.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "event-fanout.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "event-fanout.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: server
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "event-fanout.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /app/server
          ports:
            - name: http
              containerPort: {{ .Values.config.serverPort }}
              protocol: TCP
          env:
            - name: SERVER_PORT
              value: "{{ .Values.config.serverPort }}"
            - name: SERVER_HOST
              value: "{{ .Values.config.serverHost }}"
            - name: LOG_LEVEL
              value: "{{ .Values.config.logLevel }}"
            - name: ENVIRONMENT
              value: "{{ .Values.config.environment }}"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "event-fanout.fullname" . }}-db
                  key: connection-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "event-fanout.fullname" . }}-redis
                  key: connection-url
            - name: REDIS_STREAM_KEY
              value: "{{ .Values.config.redisStreamKey }}"
            - name: REDIS_CONSUMER_GROUP
              value: "{{ .Values.config.redisConsumerGroup }}"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "event-fanout.fullname" . }}-worker
  labels:
    {{- include "event-fanout.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.config.workerReplicas | default 2 }}
  selector:
    matchLabels:
      {{- include "event-fanout.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "event-fanout.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "event-fanout.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}-worker
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /app/worker
          env:
            - name: LOG_LEVEL
              value: "{{ .Values.config.logLevel }}"
            - name: ENVIRONMENT
              value: "{{ .Values.config.environment }}"
            - name: MAX_DELIVERY_RETRIES
              value: "{{ .Values.config.maxDeliveryRetries }}"
            - name: BASE_RETRY_DELAY_SECONDS
              value: "{{ .Values.config.baseRetryDelaySeconds }}"
            - name: WEBHOOK_TIMEOUT_SECONDS
              value: "{{ .Values.config.webhookTimeoutSeconds }}"
            - name: FANOUT_WORKER_POOL
              value: "{{ .Values.config.fanoutWorkerPoolSize }}"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "event-fanout.fullname" . }}-db
                  key: connection-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "event-fanout.fullname" . }}-redis
                  key: connection-url
            - name: REDIS_STREAM_KEY
              value: "{{ .Values.config.redisStreamKey }}"
            - name: REDIS_CONSUMER_GROUP
              value: "{{ .Values.config.redisConsumerGroup }}"
            - name: REDIS_CONSUMER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
