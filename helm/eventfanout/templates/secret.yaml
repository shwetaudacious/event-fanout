{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "event-fanout.fullname" . }}-db
  labels:
    {{- include "event-fanout.labels" . | nindent 4 }}
type: Opaque
stringData:
  connection-url: {{ .Values.secrets.databaseURL | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "event-fanout.fullname" . }}-redis
  labels:
    {{- include "event-fanout.labels" . | nindent 4 }}
type: Opaque
stringData:
  connection-url: {{ .Values.secrets.redisURL | quote }}
{{- end }}
