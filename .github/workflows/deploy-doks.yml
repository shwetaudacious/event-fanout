name: Deploy to DOKS

on:
  workflow_run:
    workflows: ["Build and Push"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  CLUSTER_NAME: event-fanout-cluster
  NAMESPACE: event-fanout
  RELEASE_NAME: event-fanout

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save kubeconfig for DOKS cluster
        run: doctl kubernetes cluster kubeconfig save ${{ env.CLUSTER_NAME }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy Helm chart
        run: |
          helm upgrade --install ${{ env.RELEASE_NAME }} ./helm/eventfanout \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --set image.repository=ghcr.io/${{ github.repository }} \
            --set image.tag=latest \
            --set secrets.databaseURL="${{ secrets.DATABASE_URL }}" \
            --set secrets.redisURL="${{ secrets.REDIS_URL }}"

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/${{ env.RELEASE_NAME }}-server -n ${{ env.NAMESPACE }} --timeout=180s
          kubectl rollout status deployment/${{ env.RELEASE_NAME }}-worker -n ${{ env.NAMESPACE }} --timeout=180s
