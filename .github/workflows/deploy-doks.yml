name: Deploy to DOKS

on:
  workflow_run:
    workflows: ["Build and Push"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  CLUSTER_NAME: event-fanout-cluster
  NAMESPACE: event-fanout
  RELEASE_NAME: event-fanout

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save kubeconfig for DOKS cluster
        run: doctl kubernetes cluster kubeconfig save ${{ env.CLUSTER_NAME }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy Helm chart
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          if [ -z "$DATABASE_URL" ] || [ -z "$REDIS_URL" ]; then
            echo "DATABASE_URL and REDIS_URL secrets are required for production deploy"
            exit 1
          fi
          helm upgrade --install ${{ env.RELEASE_NAME }} ./helm/eventfanout \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            -f ./helm/eventfanout/values-doks.yaml \
            --set image.repository=ghcr.io/${{ github.repository }} \
            --set image.tag=latest \
            --set secrets.databaseURL="$DATABASE_URL" \
            --set secrets.redisURL="$REDIS_URL"

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/${{ env.RELEASE_NAME }}-server -n ${{ env.NAMESPACE }} --timeout=180s
          kubectl rollout status deployment/${{ env.RELEASE_NAME }}-worker -n ${{ env.NAMESPACE }} --timeout=180s

      - name: Smoke test health endpoint
        run: |
          kubectl run curl-smoke --rm -i --restart=Never -n ${{ env.NAMESPACE }} \
            --image=curlimages/curl:8.5.0 -- \
            curl -sf "http://${{ env.RELEASE_NAME }}:80/health"
